name: Build Electron App

on:
  push:
    tags:
      - 'v*' # 只在推送 v1.0.0 等标签时触发
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发
permissions:
  contents: write
jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false # 👈 关键修改：如果一个系统挂了，不要取消另一个系统（方便调试）
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      # 1. 检出代码 (升级到 v4)
      - name: Check out Git repository
        uses: actions/checkout@v4

      # 2. 安装 Node 环境 (升级到 v4)
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. 构建前端
      - name: Build Frontend
        run: |
          cd client
          npm install
          npm run build
      
      # 4. 安装根目录依赖
      - name: Install Root Dependencies
        run: npm install

      # 5. 执行打包 (关键修复：跳过 Mac 签名)
      - name: Build Electron App
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 👇👇👇 核心修复：告诉 Mac 不要尝试寻找证书，制作免签名包
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # 6. 上传产物 (升级到 v4)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DevMaster-${{ matrix.os }}
          path: |
            dist_electron/*.exe
            dist_electron/*.dmg
          if-no-files-found: warn
          retention-days: 5
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist_electron/*.exe
            dist_electron/*.dmg
          # 自动生成 Release 说明，或者你可以自己写
          generate_release_notes: true